name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "aws/backend-task-definition.json"
      - ".github/workflows/deploy-backend-ecs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  # AWS_REGION: us-east-1
  # ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  # ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  # ECS_SERVICE: ${{ vars.ECS_SERVICE }}
   
  # ECS_CONTAINER_NAME: spendwise-backend
  
  AWS_REGION: us-east-1

  ECR_REPOSITORY: spendwise-backend

  ECS_CLUSTER: SpendWiseCluster

  ECS_SERVICE: spendwise-backend-service

  # ECS_TASK_DEFINITION: spendwise-backend
  ECS_TASK_DEFINITION: aws/backend-task-definition.json
 
  ECS_CONTAINER_NAME: spendwise-backend

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            NODE_ENV=production
            PORT=8000
            BASE_PATH=/api
            FRONTEND_ORIGIN=${{ vars.FRONTEND_ORIGIN }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_MAILER_SENDER=${{ secrets.RESEND_MAILER_SENDER }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
